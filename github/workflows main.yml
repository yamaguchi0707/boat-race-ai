name: Boat Race AI

on:

  schedule:

    - cron: "0 1 * * *"

  workflow_dispatch:

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.x"

      - name: Install packages

        run: |

          pip install -r requirements.txt

      - name: Fetch official data

        run: python fetch.py

      - name: Convert data

        run: python converter.py

      - name: Run AI

        run: python main.py
