name: Boat Race AI Test

on:

  workflow_dispatch:

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4

      - name: Python setup

        uses: actions/setup-python@v5

        with:

          python-version: "3.12"

      - name: Run AI

        run: python main.py
